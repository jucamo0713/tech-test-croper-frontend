<main class="mx-auto max-w-4xl px-4 py-6 sm:px-6 lg:px-8">
  <a routerLink="/products" class="mb-4 inline-block text-sm font-medium text-blue-700 hover:underline dark:text-blue-400" i18n>Back to products</a>
  <h1 class="mb-6 text-2xl font-bold text-gray-900 dark:text-white" i18n>Edit product</h1>
  <app-alert [message]="products.error$ | async" type="error" />

  @if (products.detailLoading$ | async) {
    <app-loader label="Loading product" />
  } @else {
    @if (products.selectedProduct$ | async; as product) {
      <app-product-form
        submitLabel="Save changes"
        [product]="product"
        [saving]="(products.saving$ | async) ?? false"
        (save)="save($event)"
      />
    }
  }
</main>
