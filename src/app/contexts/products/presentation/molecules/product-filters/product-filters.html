<form class="grid gap-3 rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-700 dark:bg-gray-800 md:grid-cols-6" [formGroup]="form" (ngSubmit)="submit()">
  <input formControlName="search" type="search" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white md:col-span-2" placeholder="Search" i18n-placeholder />
  <input formControlName="status" type="text" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Status" i18n-placeholder />
  <input formControlName="currency" type="text" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Currency" i18n-placeholder />
  <div class="grid grid-cols-2 gap-2 md:col-span-2">
    <input formControlName="minPrice" type="number" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Min price" i18n-placeholder />
    <input formControlName="maxPrice" type="number" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Max price" i18n-placeholder />
  </div>
  <label class="flex flex-col gap-1 text-xs font-medium text-gray-700 dark:text-gray-200 md:col-span-2">
    <span i18n>Created from</span>
    <input formControlName="createdFrom" type="date" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white" />
  </label>
  <label class="flex flex-col gap-1 text-xs font-medium text-gray-700 dark:text-gray-200 md:col-span-2">
    <span i18n>Created to</span>
    <input formControlName="createdTo" type="date" class="rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white" />
  </label>
  <app-button type="submit" i18n>Search</app-button>
</form>
