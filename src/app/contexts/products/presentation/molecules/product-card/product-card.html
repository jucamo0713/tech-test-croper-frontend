<article class="flex h-full flex-col rounded-lg border border-gray-200 bg-white p-5 shadow-sm hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:hover:bg-gray-700">
  <div class="mb-3 flex items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white">
        {{ product().name | translatableText }}
      </h2>
      <p class="mt-1 line-clamp-2 text-sm text-gray-600 dark:text-gray-300">
        {{ product().description | translatableText }}
      </p>
    </div>
    @if (product().status) {
      <span class="rounded bg-blue-100 px-2.5 py-0.5 text-xs font-medium text-blue-800 dark:bg-blue-900 dark:text-blue-300">
        {{ product().status }}
      </span>
    }
  </div>
  <div class="mt-auto flex items-center justify-between gap-3 pt-4">
    @if (primaryPrice(); as price) {
      <span class="text-sm font-semibold text-gray-900 dark:text-white">
        {{ price.value | currency: price.currency : 'symbol' : '1.0-0' }}
      </span>
    }
    <a [routerLink]="['/products', product().productId]" class="text-sm font-medium text-blue-700 hover:underline dark:text-blue-400" i18n>View detail</a>
  </div>
</article>
